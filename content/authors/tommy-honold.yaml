name: Tommy Honold
role: Gründer & Dating-Experte
bio: >-
  Meisterkoch, Marine-Feldkoch, CEO — und seit 2008 der Mann hinter dem grössten
  Berufs-Dating-Netzwerk im DACH-Raum. Tommy Honold bringt mit medicsingles.de
  Ärzte, Pflegekräfte und Therapeuten zusammen, die wissen, wie Schichtdienst
  und emotionale Last wirklich wiegen.
longBio: >-
  Tommy Honold, geboren 1977 am Bodensee, hat einen Lebenslauf, der eigentlich nach
  Michelin-Stern klingt — und irgendwie bei einem Dating-Netzwerk für Berufe gelandet ist.

  Er fing da an, wo die meisten aufhören würden: in der Küche seines Vaters. Die
  Mettnaustube in Radolfzell war sein erstes Klassenzimmer. Nach der Ausbildung zum Koch
  schickte ihn die Marine als Feldkoch um die Welt — und dann kam, was nie geplant war:
  2008 die erste Dating-Plattform. Heute führt er das Jobsingles-Netzwerk mit fünf
  spezialisierten Plattformen. medicsingles.de ist die neueste davon — für Menschen, die
  wissen, dass eine Beziehung mehr aushalten muss als Nachtdienst, Piepser und
  emotionale Ausnahmesituationen.
